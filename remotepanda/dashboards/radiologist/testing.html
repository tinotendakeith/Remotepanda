<body>
<button onclick="openCMD()">Open CMD</button>
<script>
    function openCMD() {
        // Check if the browser is Chrome
        if (navigator.userAgent.indexOf("Chrome") !== -1) {
            // Open a new window with the cmd: protocol
            window.open('cmd:', '_blank');
        } else {
            alert("This feature is supported only in Google Chrome.");
        }
    }
</script>O
